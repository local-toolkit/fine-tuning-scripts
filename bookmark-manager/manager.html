<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MarkNest · 书签管理</title>
  <link rel="stylesheet" href="manager.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><img class="brand-mark" src="icon48.png" alt=""><div class="brand-copy"><strong>MarkNest</strong><small>你的书签空间</small></div><button class="collapse-button" id="collapseSidebar" title="折叠侧栏" aria-label="折叠侧栏">‹</button></div>
      <button class="new-button" id="addBookmark">＋ 新建书签</button>
      <nav class="smart-nav" aria-label="智能视图">
        <button class="nav-item active" data-view="all"><span>⌂</span> 全部书签 <b id="allCount">0</b></button>
        <button class="nav-item" data-view="recent"><span>◷</span> 最近添加</button>
        <button class="nav-item" data-view="duplicates"><span>⧉</span> 重复书签 <b id="duplicateCount">0</b></button>
        <button class="nav-item" data-view="broken"><span>⚠</span> 失效链接 <b id="brokenCount">0</b></button>
      </nav>
      <div class="section-title"><span>文件夹</span><button id="addFolder" title="新建文件夹">＋</button></div>
      <div class="folder-tree" id="folderTree"></div>
      <div class="sidebar-foot"><span>所有数据保存在 Chrome</span><button id="themeToggle" title="切换主题">◐</button></div>
    </aside>

    <main class="main">
      <header class="toolbar">
        <label class="search"><span>⌕</span><input id="searchInput" placeholder="搜索标题、网址或文件夹…" autocomplete="off"><kbd>⌘ K</kbd></label>
        <button class="icon-button" id="refreshBtn" title="刷新">↻</button>
        <button class="avatar" title="本地书签">ME</button>
      </header>

      <section class="content">
        <div class="page-head">
          <div><div class="crumb" id="breadcrumb">书签库</div><h1 id="pageTitle">全部书签</h1><p id="pageDescription">集中查找、整理和维护你的收藏</p></div>
          <div class="head-actions">
            <select id="sortSelect" aria-label="排序"><option value="newest">最近添加</option><option value="oldest">最早添加</option><option value="title">按名称</option><option value="domain">按域名</option></select>
            <div class="view-switch"><button class="active" data-layout="grid" title="卡片视图">▦</button><button data-layout="list" title="列表视图">☷</button></div>
          </div>
        </div>

        <div class="insights" id="insights">
          <div><span class="insight-icon violet">◆</span><p><b id="totalMetric">0</b><small>全部书签</small></p></div>
          <div><span class="insight-icon green">◷</span><p><b id="weekMetric">0</b><small>本周新增</small></p></div>
          <div><span class="insight-icon orange">⧉</span><p><b id="duplicateMetric">0</b><small>重复项目</small></p></div>
        </div>

        <div class="bulk-bar hidden" id="bulkBar"><b>已选择 <span id="selectedCount">0</span> 项</b><button id="moveSelected">移动到…</button><button class="danger" id="deleteSelected">删除</button><button id="clearSelected">取消</button></div>
        <div class="scan-bar hidden" id="scanBar"><span>正在检查链接 <b id="scanText">0 / 0</b></span><progress id="scanProgress" max="100" value="0"></progress></div>
        <div class="bookmark-grid" id="bookmarkList"></div>
        <div class="empty hidden" id="emptyState"><span>⌕</span><h2>没有找到书签</h2><p>试试别的关键词，或在这里新建一个书签。</p><button id="emptyAdd">新建书签</button></div>
      </section>
    </main>
  </div>

  <dialog id="editDialog">
    <form method="dialog" id="editForm">
      <div class="dialog-head"><div><small id="dialogEyebrow">新建</small><h2 id="dialogTitle">新建书签</h2></div><button value="cancel" class="close" aria-label="关闭">×</button></div>
      <input type="hidden" id="editId">
      <label>名称<input id="editTitle" required maxlength="300" placeholder="例如：设计灵感"></label>
      <label>网址<input id="editUrl" type="url" required placeholder="https://example.com"></label>
      <label>保存到<select id="editFolder"></select></label>
      <div class="dialog-actions"><button value="cancel">取消</button><button type="submit" value="default" class="primary">保存</button></div>
    </form>
  </dialog>

  <dialog id="folderDialog"><form method="dialog" id="folderForm"><div class="dialog-head"><div><small>整理</small><h2 id="folderDialogTitle">新建文件夹</h2></div><button value="cancel" class="close">×</button></div><label>文件夹名称<input id="folderName" required maxlength="100"></label><label>位置<select id="folderParent"></select></label><div class="dialog-actions"><button value="cancel">取消</button><button type="submit" class="primary">创建</button></div></form></dialog>
  <dialog id="moveDialog"><form method="dialog" id="moveForm"><div class="dialog-head"><div><small>批量操作</small><h2>移动书签</h2></div><button value="cancel" class="close">×</button></div><label>移动到<select id="moveFolder"></select></label><div class="dialog-actions"><button value="cancel">取消</button><button type="submit" class="primary">移动</button></div></form></dialog>
  <div class="toast hidden" id="toast"></div>
  <div class="startup-error hidden" id="startupError"><strong>MarkNest 没有完成启动</strong><span id="startupErrorText"></span><button id="retryStart">重新尝试</button></div>
  <script src="manager.js"></script>
</body>
</html>
