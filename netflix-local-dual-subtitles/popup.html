<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Netflix 本地双字幕</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header class="app-header">
        <img class="brand-icon" src="icons/icon48.png" alt="Netflix 双字幕">
        <div>
          <h1>Netflix 双字幕</h1>
          <p>本地翻译 · Ollama</p>
        </div>
      </header>

      <section class="hero-panel">
        <div class="section-kicker">字幕助手</div>
        <label class="toggle-row">
          <span class="toggle-copy">
            <strong>启用中文翻译</strong>
            <small>在原字幕上方显示本地翻译</small>
          </span>
          <span class="switch">
            <input id="enabled" type="checkbox">
            <span class="switch-track" aria-hidden="true"><span></span></span>
          </span>
        </label>
      </section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <h2>翻译服务</h2>
            <p>选择字幕语言与本地模型</p>
          </div>
          <span class="section-badge">LOCAL</span>
        </div>

        <label><span class="field-name">原字幕语言</span>
          <select id="sourceLanguage">
            <option value="auto">自动识别</option>
            <option value="en">英语</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
          </select>
        </label>

        <label><span class="field-name">本地翻译服务</span>
          <input id="serverUrl" type="url" spellcheck="false" readonly>
        </label>

        <label><span class="field-name">模型</span>
          <select id="model">
            <option value="translategemma:4b">TranslateGemma 4B（质量优先，已下载）</option>
            <option value="hy-mt1.5:1.8b">HY-MT 1.8B（专用翻译，已下载）</option>
            <option value="qwen3:4b">Qwen3 4B（均衡，已下载）</option>
            <option value="qwen3:1.7b">Qwen3 1.7B（低延迟，已下载）</option>
            <option value="qwen2.5:3b">Qwen2.5 3B（兼容，已下载）</option>
          </select>
        </label>
      </section>

      <section class="panel settings-section">
        <div class="section-heading">
          <div>
            <h2>字幕样式</h2>
            <p>让翻译自然融入画面</p>
          </div>
        </div>
        <div class="range-label"><span>字号</span><output id="fontSizeValue"></output></div>
        <input id="fontSize" type="range" min="12" max="56" step="1">

        <label><span class="field-name">字体</span>
          <select id="fontFamily">
            <option value="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif">系统无衬线</option>
            <option value="&quot;PingFang SC&quot;, &quot;Hiragino Sans GB&quot;, sans-serif">苹方 / 冬青黑体</option>
            <option value="Helvetica, Arial, sans-serif">Helvetica / Arial</option>
            <option value="Georgia, &quot;Times New Roman&quot;, serif">Georgia / Times</option>
            <option value="Menlo, Monaco, monospace">等宽字体</option>
          </select>
        </label>

        <label><span class="field-name">字体粗细</span>
          <select id="fontWeight">
            <option value="400">普通</option>
            <option value="600">半粗</option>
            <option value="700">粗体</option>
          </select>
        </label>

        <div class="color-row">
          <label><span class="field-name">文字颜色</span><input id="textColor" type="color"></label>
          <label><span class="field-name">背景颜色</span><input id="backgroundColor" type="color"></label>
        </div>

        <div class="range-label"><span>背景透明度</span><output id="backgroundOpacityValue"></output></div>
        <input id="backgroundOpacity" type="range" min="0" max="100" step="1">
      </section>

      <section class="panel settings-section">
        <div class="section-heading">
          <div>
            <h2>字幕位置</h2>
            <p>拖动预览或微调坐标</p>
          </div>
        </div>
        <div class="range-label"><span>水平位置</span><output id="overlayXValue"></output></div>
        <input id="overlayX" type="range" min="5" max="95" step="1">
        <div class="range-label"><span>垂直位置</span><output id="overlayYValue"></output></div>
        <input id="overlayY" type="range" min="5" max="95" step="1">
        <div class="position-actions">
          <button id="dragMode">进入拖动模式</button>
          <button id="resetPosition">重置位置</button>
        </div>
      </section>

      <div class="actions">
        <button id="save" class="primary">保存设置</button>
        <button id="health">检查连接</button>
      </div>
      <div class="runtime-actions">
        <button id="startLocal" class="start">启动本地模型</button>
        <button id="stopLocal">停止本地模型</button>
      </div>
      <p id="status" class="status">正在读取设置…</p>
      <p class="hint">字号、字体、颜色、透明度和位置调整会立即同步到 Netflix；“保存设置”用于确认持久保存。</p>
      <p class="hint">启动按钮会同时运行 Ollama 和本地翻译服务。关闭、停用或重新加载插件时，会停止本次由插件托管的进程。</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
